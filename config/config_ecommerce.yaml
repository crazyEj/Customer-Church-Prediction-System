dataset:
  name: "ecommerce_churn"
  raw_path: "data/raw/ecommerce_churn.xlsx"
  processed_path: "data/processed/ecommerce_churn_processed.csv"

target:
  column: "Churn"
  positive_label: 1

id_column: "CustomerID"

features:
  categorical:
    - PreferredLoginDevice
    - PreferredPaymentMode
    - Gender
    - PreferedOrderCat
    - MaritalStatus
  numerical:
    - Tenure
    - CityTier
    - WarehouseToHome
    - HourSpendOnApp
    - NumberOfDeviceRegistered
    - SatisfactionScore
    - NumberOfAddress
    - Complain
    - OrderAmountHikeFromlastYear
    - CouponUsed
    - OrderCount
    - DaySinceLastOrder
    - CashbackAmount

model:
  saved_path: "saved_models/churn_model_ecommerce.pkl"
  random_state: 42
  test_size: 0.2